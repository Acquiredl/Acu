# ROUTES.yaml — Acu Dispatch Table
# Read FIRST for routing. Load destination CLAUDE.md only AFTER match.
# Source of truth for paths, statuses, and keywords. Other files reference, never duplicate.

subsystems:
  Orchestrator:
    path: Orchestrator
    role: Scheduler, dispatcher, reviewer
    keywords: [route, dispatch, review, push, framework, orchestrator, health, status]

  Roadmap:
    path: _roadmap
    role: Framework evolution tracker
    keywords: [roadmap, initiative, evolution, handoff, framework-work, strength, pillar, phase]

pipelines: {}

workspaces:
  Brainstorming:
    path: Brainstorming
    purpose: Incubate pipeline ideas, framework evolution
