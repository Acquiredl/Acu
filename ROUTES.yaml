  Research:
    path: Research
    purpose: Cross-pipeline intelligence
    keywords: [research, investigate, compare, evaluate, cross-pipeline-intel]

  Production:
    path: Production
    purpose: Framework-level and cross-pipeline integration only (not for standalone domain projects)
    keywords: [compose, integrate, combine, deliver, framework-build]

  Learning:
    path: Learning
    purpose: Framework meta-learning, pattern library
    keywords: [learn, pattern, meta, reflect, study]

