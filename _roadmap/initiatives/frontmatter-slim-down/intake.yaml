initiative:
  id: "frontmatter-slim-down"
  name: "Progressive Frontmatter — Off-By-Default Fields Absent from Templates"
  description: "Apply Low Learning Friction Rule 2 (progressive frontmatter) to generated pipeline and stage CLAUDE.md templates. Remove off-by-default fields (parallel_eligible: false, empty observability, eval_chain, gate_type/eval_model: inherit, empty pipeline_eval_criteria) from default templates. Present them only when the corresponding feature is enabled. Bump template version and publish update patches for existing pipelines."
